name: E2E

on:
    push:
        branches: [main]
    pull_request:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    changes:
        name: Detect changed paths
        runs-on: ubuntu-latest
        outputs:
            e2e_changed: ${{ steps.changed_paths.outputs.e2e_changed }}
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - id: changed_paths
              shell: bash
              run: |
                  set -euo pipefail

                  if [ "${{ github.event_name }}" = "pull_request" ]; then
                    base="${{ github.event.pull_request.base.sha }}"
                    head="${{ github.event.pull_request.head.sha }}"
                  else
                    base="${{ github.event.before }}"
                    head="${{ github.sha }}"
                  fi

                  if [ "$base" = "0000000000000000000000000000000000000000" ]; then
                    changed_files="$(git diff-tree --no-commit-id --name-only -r "$head")"
                  else
                    changed_files="$(git diff --name-only "$base" "$head")"
                  fi

                  e2e_paths='^(\.github/workflows/e2e\.yml|composer\.(json|lock)|package\.json|pnpm-lock\.yaml|playwright\.config\.js|\.wp-env\.json|cortext\.php|includes/|templates/|src/|build/|tests/e2e/|seed-assets/|scripts/wp-env-seed\.mjs)'

                  if [ -n "$changed_files" ] && grep -Eq "$e2e_paths" <<< "$changed_files"; then
                    echo "e2e_changed=true" >> "$GITHUB_OUTPUT"
                  else
                    echo "e2e_changed=false" >> "$GITHUB_OUTPUT"
                  fi

    playwright:
        name: Playwright
        runs-on: ubuntu-latest
        needs: changes
        if: needs.changes.outputs.e2e_changed == 'true'
        timeout-minutes: 20
        steps:
            - uses: actions/checkout@v4

            - uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.1'
                  tools: composer:v2
                  coverage: none

            - uses: actions/cache@v4
              with:
                  path: ~/.composer/cache
                  key: composer-${{ hashFiles('composer.lock') }}

            - run: composer install --no-interaction --prefer-dist --no-dev

            - uses: pnpm/action-setup@v4
              with:
                  version: 11.0.8
                  standalone: true

            - uses: actions/setup-node@v4
              with:
                  node-version: '24.15'
                  cache: 'pnpm'

            - run: pnpm install --frozen-lockfile

            - run: pnpm exec playwright install --with-deps chromium

            - run: pnpm run build

            - run: pnpm run env:start

            - run: pnpm run test:e2e
              env:
                  WP_BASE_URL: http://localhost:8888

            - if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-artifacts
                  path: |
                      artifacts/
                      playwright-report/
                  retention-days: 7
