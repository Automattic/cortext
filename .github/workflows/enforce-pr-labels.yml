name: Enforce PR labels

on:
    pull_request_target:
        types:
            - opened
            - reopened
            - synchronize
            - ready_for_review
            - labeled
            - unlabeled

permissions: {}

jobs:
    type-label:
        if: ${{ github.event.pull_request.state == 'open' && github.event.pull_request.draft == false }}
        runs-on: ubuntu-24.04
        permissions:
            pull-requests: write
        steps:
            - uses: mheap/github-action-required-labels@23e10fde7e062233401931a0eece796cd9bf3177 # v5.6.0
              with:
                  mode: exactly
                  count: 1
                  labels: '^(type: enhancement|type: bug|type: docs|type: tooling|type: dependencies|type: code quality)$'
                  use_regex: true
                  add_comment: true
                  message: |
                      **Choose one PR type**

                      Add exactly one `type:*` label before merging this PR.

                      Use one of: `type: enhancement`, `type: bug`, `type: docs`, `type: tooling`, `type: dependencies`, `type: code quality`.
                  exit_type: failure
