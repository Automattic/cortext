name: CI

on:
    push:
        branches: [main]
    pull_request:

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    lint:
        name: JS / Lint
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: 'npm'

            - run: npm ci
            - run: npm run lint:js
            - run: npm run lint:style
            - run: npm run format:check

    build:
        name: JS / Build
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: 'npm'

            - run: npm ci
            - run: npm run build
