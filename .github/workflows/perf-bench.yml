name: Performance benchmark

on:
    push:
        branches: [main]
        paths:
            - includes/CLI/**
            - src/**
            - tests/e2e/specs/perf-ui.spec.js
            - .github/workflows/perf-bench.yml
            - .github/scripts/write-perf-bench-summary.php
            - .github/scripts/write-perf-ui-summary.php
    pull_request:
        branches: [main]
        paths:
            - includes/CLI/**
            - src/**
            - tests/e2e/specs/perf-ui.spec.js
            - .github/workflows/perf-bench.yml
            - .github/scripts/write-perf-bench-summary.php
            - .github/scripts/write-perf-ui-summary.php
    workflow_dispatch:

permissions:
    actions: read
    contents: read
    pull-requests: write

env:
    CORTEXT_PERF_UI: ${{ vars.CORTEXT_PERF_UI || '0' }}

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    performance-bench:
        name: Performance benchmark
        runs-on: ubuntu-latest
        timeout-minutes: 40
        steps:
            - uses: actions/checkout@v4

            - name: Capture PR HEAD and fetch main
              if: github.event_name == 'pull_request'
              id: refs
              run: |
                  set -euo pipefail
                  echo "pr_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
                  git fetch origin main --depth=1

            - uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.1'
                  tools: composer:v2
                  coverage: none

            - uses: actions/cache@v4
              with:
                  path: ~/.composer/cache
                  key: composer-${{ hashFiles('composer.lock') }}

            - uses: pnpm/action-setup@v4
              with:
                  version: 11.0.8
                  standalone: true

            - uses: actions/setup-node@v4
              with:
                  node-version: '24.15'
                  cache: 'pnpm'

            - name: Check out main for baseline
              if: github.event_name == 'pull_request'
              run: git checkout --detach origin/main

            - name: Install dependencies (baseline)
              if: github.event_name == 'pull_request'
              run: |
                  composer install --no-interaction --prefer-dist --no-dev
                  pnpm install --frozen-lockfile

            - name: Start wp-env (baseline)
              if: github.event_name == 'pull_request'
              run: pnpm run env:start

            - name: Seed dataset (baseline)
              if: github.event_name == 'pull_request'
              run: >
                  pnpm exec wp-env run cli wp cortext perf-seed
                  --reset
                  --force
                  --collections=3
                  --rows=1250
                  --fields=8
                  --wide-fields=40
                  --relations=1
                  --rollups=1

            - name: Run baseline benchmark
              if: github.event_name == 'pull_request'
              continue-on-error: true
              run: |
                  set -euo pipefail
                  mkdir -p artifacts
                  pnpm exec wp-env run cli wp cortext perf-bench \
                    --iterations=10 \
                    --warmup=1 \
                    --pretty | tee artifacts/perf-bench-base.json

            - name: Run baseline UI performance benchmark
              if: github.event_name == 'pull_request'
              continue-on-error: true
              env:
                  CORTEXT_PERF_UI: '1'
                  # The benchmark workflow starts the dev wp-env, which serves WordPress on 8888.
                  WP_BASE_URL: http://localhost:8888
              run: |
                  set -euo pipefail

                  if [ ! -f tests/e2e/specs/perf-ui.spec.js ]; then
                    echo "No UI performance spec found."
                    exit 0
                  fi

                  pnpm exec playwright install --with-deps chromium
                  pnpm run build
                  set +e
                  pnpm exec wp-scripts test-playwright --config playwright.config.js tests/e2e/specs/perf-ui.spec.js
                  status="$?"
                  set -e

                  if [ -s artifacts/perf-ui.json ]; then
                    mv artifacts/perf-ui.json artifacts/perf-ui-base.json
                  fi

                  exit "$status"

            - name: Destroy wp-env between runs
              if: github.event_name == 'pull_request'
              run: printf 'y\n' | pnpm exec wp-env destroy

            - name: Restore PR HEAD
              if: github.event_name == 'pull_request'
              run: git checkout --detach ${{ steps.refs.outputs.pr_sha }}

            - name: Install dependencies
              run: |
                  composer install --no-interaction --prefer-dist --no-dev
                  pnpm install --frozen-lockfile

            - name: Start wp-env
              run: pnpm run env:start

            - name: Seed benchmark dataset
              run: >
                  pnpm exec wp-env run cli wp cortext perf-seed
                  --reset
                  --force
                  --collections=3
                  --rows=1250
                  --fields=8
                  --wide-fields=40
                  --relations=1
                  --rollups=1

            - name: Run benchmark
              run: |
                  set -euo pipefail
                  mkdir -p artifacts

                  run_benchmark() {
                    local output_path="$1"

                    pnpm exec wp-env run cli wp cortext perf-bench \
                      --iterations=10 \
                      --warmup=1 \
                      --budget=includes/CLI/perf-budgets.json \
                      --fail-on-budget \
                      --pretty | tee "$output_path"
                    local status="${PIPESTATUS[0]}"

                    return "$status"
                  }

                  set +e
                  run_benchmark artifacts/perf-bench.json
                  status="$?"
                  set -e

                  if [ "$status" -ne 0 ] && php .github/scripts/write-perf-bench-summary.php --current=artifacts/perf-bench.json --failures-only-metric=p95_ms; then
                    echo "Only p95 latency budgets missed; retrying the benchmark once."
                    cp artifacts/perf-bench.json artifacts/perf-bench-first.json
                    set +e
                    run_benchmark artifacts/perf-bench.json
                    status="$?"
                    set -e
                  fi

                  exit "$status"

            - name: Run UI performance benchmark
              if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || env.CORTEXT_PERF_UI == '1'
              env:
                  CORTEXT_PERF_UI: '1'
                  # The benchmark workflow starts the dev wp-env, which serves WordPress on 8888.
                  WP_BASE_URL: http://localhost:8888
              run: |
                  set -euo pipefail

                  if [ ! -f tests/e2e/specs/perf-ui.spec.js ]; then
                    echo "No UI performance spec found."
                    exit 0
                  fi

                  pnpm exec playwright install --with-deps chromium
                  pnpm run build
                  pnpm exec wp-scripts test-playwright --config playwright.config.js tests/e2e/specs/perf-ui.spec.js

            - name: Write benchmark summaries
              if: always()
              env:
                  BASE_REF: main
              run: |
                  mkdir -p artifacts

                  args=(--current=artifacts/perf-bench.json)
                  if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
                    args+=(--base=artifacts/perf-bench-base.json --base-label="${BASE_REF:-base}")
                  fi

                  php .github/scripts/write-perf-bench-summary.php "${args[@]}" | tee artifacts/perf-bench-summary.md

                  if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
                    php .github/scripts/write-perf-bench-summary.php \
                      --current=artifacts/perf-bench.json \
                      --base=artifacts/perf-bench-base.json \
                      --base-label=main \
                      --comparison-only \
                      --summary= > artifacts/perf-bench-comment-body.md
                  fi

                  if [ -s artifacts/perf-ui.json ]; then
                    ui_args=(--current=artifacts/perf-ui.json)
                    if [ "$GITHUB_EVENT_NAME" = "pull_request" ] && [ -s artifacts/perf-ui-base.json ]; then
                      ui_args+=(--base=artifacts/perf-ui-base.json --base-label=main)
                    fi

                    php .github/scripts/write-perf-ui-summary.php "${ui_args[@]}" | tee artifacts/perf-ui-summary.md
                  fi

                  if [ "$GITHUB_EVENT_NAME" = "pull_request" ] && [ -s artifacts/perf-ui-summary.md ]; then
                    {
                      echo
                      echo '<details>'
                      echo '<summary>Show UI performance benchmark</summary>'
                      echo
                      cat artifacts/perf-ui-summary.md
                      echo
                      echo '</details>'
                    } >> artifacts/perf-bench-comment-body.md
                  fi

            - name: Post PR benchmark comment
              if: always() && github.event_name == 'pull_request'
              continue-on-error: true
              env:
                  GH_TOKEN: ${{ github.token }}
                  PR_NUMBER: ${{ github.event.pull_request.number }}
                  REPOSITORY: ${{ github.repository }}
              run: |
                  set -euo pipefail

                  if [ ! -s artifacts/perf-bench-comment-body.md ]; then
                    exit 0
                  fi

                  marker='<!-- cortext-perf-bench-comment -->'
                  comment_file='artifacts/perf-bench-comment.md'
                  {
                    echo "$marker"
                    cat artifacts/perf-bench-comment-body.md
                  } > "$comment_file"

                  if ! comment_id="$(gh api "repos/$REPOSITORY/issues/$PR_NUMBER/comments" \
                    --paginate \
                    --jq '.[] | select(.user.type == "Bot" and (.body | contains("<!-- cortext-perf-bench-comment -->"))) | .id' \
                    | tail -n 1)"; then
                    echo "Could not read existing PR benchmark comments; skipping comment."
                    exit 0
                  fi

                  if [ -n "$comment_id" ]; then
                    if ! gh api --method PATCH "repos/$REPOSITORY/issues/comments/$comment_id" \
                      --field "body=@$comment_file" >/dev/null; then
                      echo "Could not update PR benchmark comment; skipping comment."
                    fi
                  else
                    if ! gh api --method POST "repos/$REPOSITORY/issues/$PR_NUMBER/comments" \
                      --field "body=@$comment_file" >/dev/null; then
                      echo "Could not create PR benchmark comment; skipping comment."
                    fi
                  fi

            - if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: perf-bench
                  path: |
                      artifacts/perf-bench*.json
                      playwright-report/
                  retention-days: 7
