name: Performance benchmark

on:
    push:
        branches: [main]
        paths:
            - includes/CLI/**
            - src/**
            - tests/e2e/specs/perf-ui.spec.js
            - .github/workflows/perf-bench.yml
            - .github/scripts/write-perf-bench-summary.php
            - .github/scripts/write-perf-ui-summary.php
    workflow_dispatch:

permissions:
    actions: read
    contents: read

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    main-perf:
        name: Performance benchmark on main
        runs-on: ubuntu-latest
        continue-on-error: true
        timeout-minutes: 40
        steps:
            - uses: actions/checkout@v7.0.0

            - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
              with:
                  php-version: '8.1'
                  tools: composer:v2
                  coverage: none

            - uses: actions/cache@v6.1.0
              with:
                  path: ~/.composer/cache
                  key: composer-${{ hashFiles('composer.lock') }}

            - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
              with:
                  version: 11.0.8
                  standalone: true

            - uses: actions/setup-node@v6
              with:
                  node-version: '24.15'
                  cache: 'pnpm'

            - name: Install dependencies
              run: |
                  composer install --no-interaction --prefer-dist --no-dev
                  pnpm install --frozen-lockfile

            - name: Start wp-env
              run: pnpm run env:start

            - name: Seed dataset
              run: >
                  pnpm exec wp-env run cli wp cortext perf-seed
                  --reset
                  --force
                  --collections=3
                  --rows=1250
                  --fields=8
                  --wide-fields=40
                  --relations=1
                  --rollups=1

            - name: Run backend benchmark
              run: |
                  set -euo pipefail
                  mkdir -p artifacts

                  run_benchmark() {
                    local output_path="$1"

                    pnpm exec wp-env run cli wp cortext perf-bench \
                      --iterations=10 \
                      --warmup=1 \
                      --budget=includes/CLI/perf-budgets.json \
                      --fail-on-budget \
                      --pretty | tee "$output_path"
                    local status="${PIPESTATUS[0]}"

                    return "$status"
                  }

                  set +e
                  run_benchmark artifacts/perf-bench.json
                  status="$?"
                  set -e

                  if [ "$status" -ne 0 ] && php .github/scripts/write-perf-bench-summary.php --current=artifacts/perf-bench.json --failures-only-metric=p95_ms; then
                    echo "Only p95 latency budgets missed; retrying the benchmark once."
                    cp artifacts/perf-bench.json artifacts/perf-bench-first.json
                    set +e
                    run_benchmark artifacts/perf-bench.json
                    status="$?"
                    set -e
                  fi

                  exit "$status"

            - name: Run UI benchmark
              if: ${{ false }}
              env:
                  CORTEXT_PERF_UI: '1'
                  # wp-env serves WordPress on 8888.
                  WP_BASE_URL: http://localhost:8888
              run: |
                  set -euo pipefail

                  if [ ! -f tests/e2e/specs/perf-ui.spec.js ]; then
                    echo "No UI performance spec found."
                    exit 0
                  fi

                  pnpm exec playwright install --with-deps chromium
                  pnpm run build
                  pnpm exec wp-scripts test-playwright --config playwright.config.js tests/e2e/specs/perf-ui.spec.js

            - name: Write benchmark summaries
              if: always()
              run: |
                  mkdir -p artifacts
                  php .github/scripts/write-perf-bench-summary.php --current=artifacts/perf-bench.json | tee artifacts/perf-bench-summary.md
                  if [ -s artifacts/perf-ui.json ]; then
                    php .github/scripts/write-perf-ui-summary.php --current=artifacts/perf-ui.json | tee artifacts/perf-ui-summary.md
                  fi

            - name: Save benchmark artifacts
              if: always()
              uses: actions/upload-artifact@v7
              with:
                  name: perf-bench
                  path: |
                      artifacts/perf-bench*.json
                      artifacts/perf-ui*.json
                      playwright-report/
                  retention-days: 7
