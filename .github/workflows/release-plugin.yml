name: Release plugin ZIP

on:
    workflow_call:
        inputs:
            milestone:
                required: true
                type: string
            prerelease:
                required: false
                default: true
                type: boolean
            dry_run:
                required: false
                default: true
                type: boolean
            ref:
                required: false
                default: ''
                type: string
    workflow_dispatch:
        inputs:
            milestone:
                description: 'Release milestone/version, for example 0.1.1 or 0.2.0'
                required: true
            prerelease:
                description: 'Prerelease'
                required: true
                default: true
                type: boolean
            dry_run:
                description: 'Dry run (uploads files only; no tag or release)'
                required: true
                default: true
                type: boolean
            ref:
                description: 'Git ref to build'
                required: false
                default: ''

permissions:
    contents: write
    issues: read
    pull-requests: read

concurrency:
    group: cortext-release-plugin-${{ inputs.milestone }}
    cancel-in-progress: true

jobs:
    plugin:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7.0.0
              with:
                  ref: ${{ inputs.ref || github.sha }}

            - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
              with:
                  version: 11.0.8
                  standalone: true

            - uses: actions/setup-node@v6
              with:
                  node-version: '24.15'
                  cache: 'pnpm'

            - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
              with:
                  php-version: '8.1'
                  tools: composer:v2
                  coverage: none

            - uses: actions/cache@v6.1.0
              with:
                  path: ~/.composer/cache
                  key: composer-${{ hashFiles('composer.lock') }}

            - name: Resolve milestone
              id: milestone
              uses: actions/github-script@v9
              env:
                  MILESTONE: ${{ inputs.milestone }}
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const milestoneTitle = process.env.MILESTONE.trim();

                      if ( ! /^\d+\.\d+\.\d+$/.test( milestoneTitle ) ) {
                        throw new Error( `Release milestones must use the WordPress-style format 0.1.0, without a leading "v". Received "${ milestoneTitle }".` );
                      }

                      const milestones = await github.paginate(
                        github.rest.issues.listMilestones,
                        { owner, repo, state: 'open', per_page: 100 }
                      );

                      const milestone = milestones.find( ( item ) => item.title === milestoneTitle );
                      if ( ! milestone ) {
                        const openMilestones = milestones.map( ( item ) => item.title ).join( ', ' ) || 'none';
                        throw new Error( `Cannot find open release milestone "${ milestoneTitle }". Open milestones: ${ openMilestones }.` );
                      }

                      core.setOutput( 'title', milestone.title );
                      core.setOutput( 'version', milestone.title );

            - name: Update release metadata
              env:
                  VERSION: ${{ steps.milestone.outputs.version }}
              run: node scripts/bump-release-version.mjs "$VERSION"

            - name: Generate release notes
              env:
                  GH_TOKEN: ${{ github.token }}
                  MILESTONE: ${{ steps.milestone.outputs.title }}
                  REPOSITORY: ${{ github.repository }}
                  VERSION: ${{ steps.milestone.outputs.version }}
              run: |
                  node scripts/release-notes.mjs \
                    --repo "$REPOSITORY" \
                    --milestone "$MILESTONE" \
                    --version "$VERSION" \
                    --strict > release-notes.md

            - name: Append desktop install note
              run: |
                  cat >> release-notes.md <<'EOF'

                  ## Installing the macOS app

                  The macOS DMG is signed and notarized. Move Cortext to Applications before opening it.
                  EOF

            - name: Build plugin ZIP
              run: ./scripts/build-zip.sh

            - name: Check release files
              run: |
                  test -s release-notes.md
                  test -s dist/cortext.zip

            - name: Summarize release ZIP
              env:
                  VERSION: ${{ steps.milestone.outputs.version }}
              run: |
                  unzip -Z1 dist/cortext.zip > release-zip-contents.txt

                  plugin_version="$(unzip -p dist/cortext.zip cortext/cortext.php | awk -F': *' '/^[[:space:]]+\* Version:/ { print $2; exit }')"
                  constant_version="$(unzip -p dist/cortext.zip cortext/cortext.php | sed -n "s/.*define( 'CORTEXT_VERSION', '\([^']*\)' ).*/\1/p")"
                  stable_tag="$(unzip -p dist/cortext.zip cortext/readme.txt | awk -F': *' '/^Stable tag:/ { print $2; exit }')"
                  zip_size="$(du -h dist/cortext.zip | cut -f1)"
                  zip_entries="$(wc -l < release-zip-contents.txt | tr -d ' ')"

                  if [ "$plugin_version" != "$VERSION" ]; then
                    echo "::error::Expected plugin header version $VERSION, found $plugin_version"
                    exit 1
                  fi

                  if [ "$constant_version" != "$VERSION" ]; then
                    echo "::error::Expected CORTEXT_VERSION $VERSION, found $constant_version"
                    exit 1
                  fi

                  if [ "$stable_tag" != "$VERSION" ]; then
                    echo "::error::Expected readme stable tag $VERSION, found $stable_tag"
                    exit 1
                  fi

                  required_paths=(
                    cortext/cortext.php
                    cortext/readme.txt
                    cortext/composer.json
                    cortext/vendor/autoload.php
                    cortext/build/index.js
                  )

                  for path in "${required_paths[@]}"; do
                    if ! grep -Fxq "$path" release-zip-contents.txt; then
                      echo "::error::Missing required release file: $path"
                      exit 1
                    fi
                  done

                  # Keep the public ZIP to the runtime files we expect. This
                  # catches local dev helpers, desktop-only files, WordPress
                  # core copies, and other files that should stay out of a
                  # plugin release.
                  allowed='^cortext/(cortext\.php|readme\.txt|LICENSE|composer\.json)$|^cortext/(includes|templates|build|seed-assets|vendor|assets/brand)/'
                  if grep -v '/$' release-zip-contents.txt | grep -vE "$allowed" > release-zip-unexpected.txt; then
                    echo "::error::Release ZIP contains files outside the runtime allowlist"
                    cat release-zip-unexpected.txt
                    exit 1
                  fi

                  if grep -qiE 'autologin|auto-login' release-zip-contents.txt; then
                    echo "::error::Release ZIP contains auto-login code"
                    exit 1
                  fi

                  {
                    echo "## Release ZIP"
                    echo ""
                    echo "- File: \`dist/cortext.zip\`"
                    echo "- Size: \`$zip_size\`"
                    echo "- Entries: \`$zip_entries\`"
                    echo "- Plugin header version: \`$plugin_version\`"
                    echo "- \`CORTEXT_VERSION\`: \`$constant_version\`"
                    echo "- Stable tag: \`$stable_tag\`"
                    echo "- Required runtime files: present"
                    echo "- Source and development-only paths: absent"
                  } >> "$GITHUB_STEP_SUMMARY"

            - name: Upload dry-run files
              if: ${{ inputs.dry_run }}
              uses: actions/upload-artifact@v7
              with:
                  name: cortext-release-${{ steps.milestone.outputs.version }}-dry-run
                  path: |
                      release-notes.md
                      dist/cortext.zip

            - name: Write dry-run summary
              if: ${{ inputs.dry_run }}
              env:
                  ARTIFACT_NAME: cortext-release-${{ steps.milestone.outputs.version }}-dry-run
                  MILESTONE: ${{ steps.milestone.outputs.title }}
                  VERSION: ${{ steps.milestone.outputs.version }}
              run: |
                  {
                    echo "## Release dry run"
                    echo ""
                    echo "- Version: \`$VERSION\`"
                    echo "- Milestone: \`$MILESTONE\`"
                    echo "- Artifact: \`$ARTIFACT_NAME\`"
                    echo ""
                    echo "No GitHub Release or tag was created."
                  } >> "$GITHUB_STEP_SUMMARY"

            - name: Create or update draft GitHub Release
              if: ${{ ! inputs.dry_run }}
              uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
              with:
                  tag_name: ${{ steps.milestone.outputs.version }}
                  # Empty when run standalone without a ref: creation then
                  # defaults to the default branch, and reruns against an
                  # existing draft keep its pinned commit.
                  target_commitish: ${{ inputs.ref }}
                  name: ${{ steps.milestone.outputs.version }}
                  body_path: release-notes.md
                  draft: true
                  prerelease: ${{ inputs.prerelease }}
                  files: dist/cortext.zip
