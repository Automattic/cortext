name: Release desktop DMG

on:
    workflow_call:
        inputs:
            version:
                required: true
                type: string
            prerelease:
                required: false
                default: true
                type: boolean
            dry_run:
                required: false
                default: true
                type: boolean
    workflow_dispatch:
        inputs:
            version:
                description: 'Version'
                required: true
                default: '0.1.0'
            prerelease:
                description: 'Prerelease'
                required: true
                default: true
                type: boolean
            dry_run:
                description: 'Dry run (uploads files only; no release)'
                required: true
                default: true
                type: boolean

permissions:
    contents: write

concurrency:
    group: cortext-release-desktop-${{ inputs.version }}
    cancel-in-progress: true

jobs:
    desktop:
        name: Build desktop DMG (macOS arm64)
        runs-on: macos-14
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4
              with:
                  version: 11.0.8
                  standalone: true

            - uses: actions/setup-node@v4
              with:
                  node-version: '24.15'
                  cache: 'pnpm'

            - uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.1'
                  tools: composer:v2
                  coverage: none

            - uses: actions/cache@v4
              with:
                  path: ~/.composer/cache
                  key: composer-${{ hashFiles('composer.lock') }}

            - name: Install PHP dependencies
              run: composer install --no-dev --optimize-autoloader --no-interaction

            - name: Install JS dependencies
              run: pnpm install --frozen-lockfile

            - name: Install desktop dependencies
              working-directory: apps/desktop
              run: npm ci

            # static-php-cli compiles natively; a macos-14 runner yields arm64.
            # The build is the slow part, so cache the result across runs.
            - name: Cache bundled PHP runtime
              uses: actions/cache@v4
              with:
                  path: |
                      apps/desktop/.runtime-cache
                      apps/desktop/runtime/bin
                  key: desktop-runtime-php-${{ hashFiles('apps/desktop/scripts/install-runtime.mjs') }}

            - name: Build bundled arm64 PHP
              working-directory: apps/desktop
              run: npm run runtime:php

            - name: Cache snapshot downloads (WP core + wp-cli + SQLite plugin)
              uses: actions/cache@v4
              with:
                  path: apps/desktop/.snapshot-cache
                  key: desktop-snapshot-cache-${{ hashFiles('apps/desktop/scripts/build-snapshot.mjs') }}

            - name: Build distribution snapshot
              working-directory: apps/desktop
              env:
                  CORTEXT_DESKTOP_DISTRIBUTION: '1'
              run: npm run snapshot

            - name: Build unsigned DMG
              working-directory: apps/desktop
              env:
                  VERSION: ${{ inputs.version }}
              run: npm run dist -- -c.extraMetadata.version="$VERSION"

            - name: Upload dry-run DMG
              if: ${{ inputs.dry_run }}
              uses: actions/upload-artifact@v4
              with:
                  name: cortext-desktop-dmg-${{ inputs.version }}
                  path: apps/desktop/dist/*.dmg
                  if-no-files-found: error

            # Attach the DMG to the Release for this tag. Only files are set, so
            # the plugin workflow stays the owner of the Release title and notes.
            - name: Attach DMG to draft GitHub Release
              if: ${{ ! inputs.dry_run }}
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ inputs.version }}
                  draft: true
                  prerelease: ${{ inputs.prerelease }}
                  files: apps/desktop/dist/*.dmg
