name: Prepare release

on:
    workflow_dispatch:
        inputs:
            version:
                description: 'Version'
                required: true
                default: '0.1.0'
            prerelease:
                description: 'Prerelease'
                required: true
                default: true
                type: boolean
            dry_run:
                description: 'Dry run (uploads files only; no tag or release)'
                required: true
                default: true
                type: boolean

permissions:
    contents: write
    issues: read
    pull-requests: read

concurrency:
    group: cortext-release-${{ inputs.version }}
    cancel-in-progress: true

# GitHub Actions prepares the plugin ZIP and draft Release. Buildkite owns the
# signed desktop DMG and attaches it from the release tag build.
jobs:
    plugin:
        uses: ./.github/workflows/release-plugin.yml
        with:
            version: ${{ inputs.version }}
            prerelease: ${{ inputs.prerelease }}
            dry_run: ${{ inputs.dry_run }}
        secrets: inherit
