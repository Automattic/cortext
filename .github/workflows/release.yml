name: Prepare release

on:
    workflow_dispatch:
        inputs:
            version:
                description: 'Version'
                required: true
                default: '0.1.0'
            prerelease:
                description: 'Prerelease'
                required: true
                default: true
                type: boolean
            dry_run:
                description: 'Dry run (uploads files only; no tag or release)'
                required: true
                default: true
                type: boolean

permissions:
    contents: write
    issues: read
    pull-requests: read

concurrency:
    group: cortext-release-${{ inputs.version }}
    cancel-in-progress: true

# Orchestrator: builds the plugin ZIP and the desktop DMG and lets each attach
# to the same tagged Release. Either child can also be run on its own from the
# Actions tab; the first run creates the draft Release, later runs attach to it.
jobs:
    plugin:
        uses: ./.github/workflows/release-plugin.yml
        with:
            version: ${{ inputs.version }}
            prerelease: ${{ inputs.prerelease }}
            dry_run: ${{ inputs.dry_run }}
        secrets: inherit

    desktop:
        uses: ./.github/workflows/release-desktop.yml
        with:
            version: ${{ inputs.version }}
            prerelease: ${{ inputs.prerelease }}
            dry_run: ${{ inputs.dry_run }}
        secrets: inherit
