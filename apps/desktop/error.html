<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>Cortext</title>
		<style>
			html,
			body {
				margin: 0;
				padding: 0;
				height: 100%;
				background: #1d1d1d;
				color: #f4f4f4;
				font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
				display: flex;
				align-items: center;
				justify-content: center;
			}
			.wrap {
				text-align: center;
				max-width: 420px;
				padding: 24px;
			}
			h1 {
				font-weight: 500;
				font-size: 20px;
				margin: 0 0 8px;
			}
			p {
				color: #9c9c9c;
				margin: 0 0 8px;
				font-size: 13px;
				line-height: 1.5;
			}
		</style>
	</head>
	<body>
		<div class="wrap">
			<h1>Cortext could not start</h1>
			<p>The local workspace did not become ready in time.</p>
			<p>Quit the app and check the terminal output for details.</p>
		</div>
	</body>
</html>
