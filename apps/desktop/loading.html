<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>Cortext</title>
		<style>
			html,
			body {
				margin: 0;
				padding: 0;
				height: 100%;
				background: #1d1d1d;
				color: #f4f4f4;
				font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
				display: flex;
				align-items: center;
				justify-content: center;
			}
			.wrap {
				text-align: center;
			}
			h1 {
				font-weight: 500;
				font-size: 22px;
				margin: 0 0 8px;
			}
			p {
				color: #9c9c9c;
				margin: 0;
				font-size: 13px;
			}
			.dot {
				display: inline-block;
				width: 8px;
				height: 8px;
				margin: 0 3px;
				border-radius: 50%;
				background: #5a5a5a;
				animation: pulse 1.2s infinite ease-in-out;
			}
			.dot:nth-child(2) {
				animation-delay: 0.15s;
			}
			.dot:nth-child(3) {
				animation-delay: 0.3s;
			}
			@keyframes pulse {
				0%, 80%, 100% {
					transform: scale(0.6);
					opacity: 0.5;
				}
				40% {
					transform: scale(1);
					opacity: 1;
				}
			}
		</style>
	</head>
	<body>
		<div class="wrap">
			<h1>Starting Cortext</h1>
			<p>Booting the local WordPress runtime.</p>
			<div style="margin-top: 24px;">
				<span class="dot"></span>
				<span class="dot"></span>
				<span class="dot"></span>
			</div>
		</div>
	</body>
</html>
